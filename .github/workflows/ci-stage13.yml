name: stage13-ci

on:
  pull_request:
  push:
    branches:
      - main
      - release-*
      - stage-*

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: --config .golangci.yml --timeout 5m

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run unit tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Run race tests
        env:
          CGO_ENABLED: 1
        run: go test -race ./...

      - name: Run vulnerability scan
        run: govulncheck ./...
