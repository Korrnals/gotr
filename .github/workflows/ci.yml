name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - release-*
      - stage-*

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        continue-on-error: true  # TODO(stage-13.5): fix pre-existing lint issues, then remove
        with:
          version: v2.11.4
          args: --config .golangci.yml

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run unit tests
        env:
          EDITOR: "true"  # prevent editor_test from hanging on interactive vi
        run: go test -timeout 120s -count=1 $(go list ./... | grep -v internal/concurrency)

      - name: Run concurrency tests
        continue-on-error: true  # TODO(stage-13.5): optimize internal/concurrency test durations for CI
        run: go test -timeout 300s -count=1 ./internal/concurrency/

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Run race tests (excl. concurrency)
        env:
          CGO_ENABLED: 1
          EDITOR: "true"  # prevent editor_test from hanging on interactive vi
        run: go test -race -timeout 120s -count=1 $(go list ./... | grep -v internal/concurrency)

      - name: Run vulnerability scan
        run: govulncheck ./...
